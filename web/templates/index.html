<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Solar Tracker Control</title>
    <link rel="stylesheet" href="/static/style.css?v=38">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>Solar Tracker</h1>
            <div class="status-badges">
                <span class="badge" id="serial-status"><span class="dot"></span><span id="serial-text">Serial</span></span>
                <span class="badge" id="ws-status"><span class="dot"></span><span id="ws-text">WS</span></span>
                <span class="badge badge-info" id="last-update-badge">--</span>
            </div>
        </header>

        <!-- Alarms Banner (only visible when active) -->
        <div class="alarm-banner" id="alarm-banner" style="display:none">
            <div class="alarm-banner-content">
                <span class="alarm-icon">&#9888;</span>
                <ul class="alarm-list" id="alarm-list"></ul>
                <button id="clear-alarms-btn" class="btn btn-sm btn-warning">Clear</button>
            </div>
        </div>

        <!-- Position Gauges -->
        <section class="card">
            <div class="card-header">
                <h2>Position</h2>
                <div class="tracker-info">
                    <span id="tracker-date">--/--/----</span>
                    <span id="tracker-time">--:--:--</span>
                </div>
            </div>
            <!-- Scene Visualization -->
            <div class="scene-container">
                <svg id="scene" viewBox="0 0 480 200" class="scene-svg" preserveAspectRatio="xMidYMid meet">
                    <defs>
                        <linearGradient id="sky-gradient" x1="0" y1="0" x2="0" y2="1">
                            <stop id="sky-top" offset="0%" stop-color="#0a1628"/>
                            <stop id="sky-mid" offset="60%" stop-color="#16213e"/>
                            <stop id="sky-bottom" offset="100%" stop-color="#1a2940"/>
                        </linearGradient>
                        <radialGradient id="sun-glow" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="rgba(255,193,7,0.5)"/>
                            <stop offset="30%" stop-color="rgba(255,193,7,0.15)"/>
                            <stop offset="100%" stop-color="rgba(255,193,7,0)"/>
                        </radialGradient>
                        <linearGradient id="ground-gradient" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#1a3020"/>
                            <stop offset="100%" stop-color="#0a1810"/>
                        </linearGradient>
                        <!-- Sun rays for daytime -->
                        <radialGradient id="sun-rays" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="rgba(255,220,100,0.3)"/>
                            <stop offset="100%" stop-color="rgba(255,220,100,0)"/>
                        </radialGradient>
                    </defs>
                    <!-- Sky -->
                    <rect x="0" y="0" width="480" height="150" fill="url(#sky-gradient)"/>
                    <!-- Stars (visible at night) -->
                    <g id="scene-stars" opacity="0">
                        <circle cx="50" cy="20" r="1" fill="white"/><circle cx="120" cy="35" r="0.8" fill="white"/>
                        <circle cx="200" cy="15" r="1.2" fill="white"/><circle cx="310" cy="28" r="0.8" fill="white"/>
                        <circle cx="380" cy="12" r="1" fill="white"/><circle cx="440" cy="40" r="0.7" fill="white"/>
                        <circle cx="80" cy="55" r="0.6" fill="white"/><circle cx="260" cy="50" r="0.9" fill="white"/>
                        <circle cx="420" cy="60" r="0.8" fill="white"/><circle cx="160" cy="65" r="0.7" fill="white"/>
                    </g>
                    <!-- E / W labels on horizon (East=right, West=left, matching compass) -->
                    <text x="462" y="148" fill="rgba(255,255,255,0.2)" font-size="10" font-family="sans-serif">E</text>
                    <text x="15" y="148" fill="rgba(255,255,255,0.2)" font-size="10" font-family="sans-serif">W</text>
                    <!-- Ground -->
                    <rect x="0" y="150" width="480" height="50" fill="url(#ground-gradient)"/>
                    <!-- Horizon line -->
                    <line x1="0" y1="150" x2="480" y2="150" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
                    <!-- Sun glow (behind clouds) -->
                    <circle id="scene-sun-glow" cx="240" cy="70" r="50" fill="url(#sun-glow)" opacity="0"/>
                    <!-- Clouds (behind sun disc, so sun peeks through) -->
                    <g id="weather-clouds" opacity="0">
                        <ellipse cx="320" cy="45" rx="40" ry="18" fill="rgba(180,190,200,0.35)"/>
                        <ellipse cx="340" cy="38" rx="30" ry="15" fill="rgba(180,190,200,0.45)"/>
                        <ellipse cx="305" cy="40" rx="25" ry="12" fill="rgba(180,190,200,0.3)"/>
                        <ellipse cx="420" cy="65" rx="35" ry="14" fill="rgba(180,190,200,0.25)"/>
                        <ellipse cx="440" cy="58" rx="25" ry="12" fill="rgba(180,190,200,0.35)"/>
                    </g>
                    <!-- Sun rays -->
                    <circle id="scene-sun-rays" cx="240" cy="70" r="30" fill="url(#sun-rays)" opacity="0"/>
                    <!-- Sun disc (on top of clouds) -->
                    <circle id="scene-sun" cx="240" cy="70" r="14" fill="#ffc107" opacity="0"/>
                    <!-- Rain (in front of everything in sky) -->
                    <g id="weather-rain" opacity="0">
                        <line x1="290" y1="60" x2="288" y2="72" class="raindrop rd1"/>
                        <line x1="310" y1="55" x2="308" y2="67" class="raindrop rd2"/>
                        <line x1="330" y1="62" x2="328" y2="74" class="raindrop rd3"/>
                        <line x1="350" y1="58" x2="348" y2="70" class="raindrop rd4"/>
                        <line x1="305" y1="75" x2="303" y2="87" class="raindrop rd5"/>
                        <line x1="325" y1="70" x2="323" y2="82" class="raindrop rd6"/>
                        <line x1="345" y1="76" x2="343" y2="88" class="raindrop rd7"/>
                        <line x1="315" y1="88" x2="313" y2="100" class="raindrop rd8"/>
                        <line x1="335" y1="84" x2="333" y2="96" class="raindrop rd9"/>
                        <line x1="400" y1="72" x2="398" y2="84" class="raindrop rd10"/>
                        <line x1="420" y1="68" x2="418" y2="80" class="raindrop rd11"/>
                        <line x1="440" y1="75" x2="438" y2="87" class="raindrop rd12"/>
                    </g>
                    <!-- Panel shadow on ground -->
                    <polygon id="panel-shadow" points="25,160 95,160 105,185 15,185" fill="rgba(0,0,0,0.25)" opacity="0"/>
                    <!-- Panel assembly (far left) -->
                    <!-- Post -->
                    <line id="scene-post" x1="60" y1="150" x2="60" y2="95" stroke="#445566" stroke-width="4" stroke-linecap="round"/>
                    <!-- Panel (rotates around mount point) -->
                    <g id="scene-panel" transform="rotate(0, 60, 95)">
                        <line x1="25" y1="95" x2="95" y2="95" stroke="#2a6090" stroke-width="8" stroke-linecap="round"/>
                        <line x1="43" y1="91" x2="43" y2="99" stroke="#3a80b0" stroke-width="0.5"/>
                        <line x1="60" y1="91" x2="60" y2="99" stroke="#3a80b0" stroke-width="0.5"/>
                        <line x1="77" y1="91" x2="77" y2="99" stroke="#3a80b0" stroke-width="0.5"/>
                        <rect id="panel-highlight" x="25" y="91" width="70" height="8" rx="1" fill="rgba(150,200,255,0.15)" opacity="0"/>
                    </g>
                    <!-- (clouds and rain are placed in sky layer above) -->
                    <!-- Info text (bottom left) -->
                    <text id="scene-sunrise" x="10" y="170" fill="rgba(255,255,255,0.4)" font-size="10" font-family="sans-serif"></text>
                    <text id="scene-weather" x="10" y="185" fill="rgba(255,255,255,0.4)" font-size="10" font-family="sans-serif"></text>
                </svg>
            </div>

            <!-- Gauges + Controls in one row -->
            <div class="dashboard-row">
                <!-- Left: Gauges stacked -->
                <div class="gauges-col">
                    <div class="gauge-row">
                        <!-- Compass (southern half only via viewBox crop) -->
                        <div class="gauge-container">
                            <svg id="compass-gauge" viewBox="0 0 200 200" class="compass-svg">
                                <circle cx="100" cy="100" r="95" class="gauge-bg"/>
                                <g id="compass-ticks"></g>
                                <text x="100" y="22" class="cardinal">N</text>
                                <text x="100" y="188" class="cardinal">S</text>
                                <text x="12" y="105" class="cardinal">W</text>
                                <text x="188" y="105" class="cardinal">E</text>
                                <g id="sun-needle" class="needle sun-needle">
                                    <line x1="100" y1="100" x2="100" y2="30"/>
                                    <circle cx="100" cy="30" r="6" class="sun-dot"/>
                                </g>
                                <g id="panel-needle" class="needle panel-needle">
                                    <line x1="100" y1="100" x2="100" y2="35"/>
                                    <polygon points="96,40 104,40 100,28"/>
                                </g>
                                <g id="compass-limits" class="limit-markers"></g>
                                <circle cx="100" cy="100" r="4" class="center-dot"/>
                            </svg>
                            <div class="gauge-legend">
                                <span class="legend-sun">&#9728; <span id="sun-azimuth">--</span>&deg;</span>
                                <span class="legend-panel">&#9654; <span id="pos-horizontal">--</span>&deg;</span>
                            </div>
                        </div>
                        <!-- Altitude (compact, no negative zone) -->
                        <div class="gauge-container">
                            <svg id="altitude-gauge" viewBox="0 0 120 120" class="altitude-svg">
                                <path d="M 10 105 A 90 90 0 0 1 100 15" class="arc-bg"/>
                                <g id="altitude-ticks"></g>
                                <g id="altitude-ticks-below" style="display:none"></g>
                                <text x="6" y="100" class="tick-label">0&deg;</text>
                                <text x="100" y="10" class="tick-label" text-anchor="middle">90&deg;</text>
                                <g id="altitude-limits" class="limit-markers"></g>
                                <g id="sun-alt-needle-group">
                                    <line id="sun-alt-needle" x1="100" y1="105" x2="10" y2="105" class="needle-line sun-color"/>
                                    <circle id="sun-alt-dot" cx="10" cy="105" r="4" class="sun-alt-dot"/>
                                </g>
                                <line id="panel-alt-needle" x1="100" y1="105" x2="10" y2="105" class="needle-line panel-color"/>
                                <circle cx="100" cy="105" r="3" class="center-dot"/>
                            </svg>
                            <div class="gauge-legend">
                                <span class="legend-sun">&#9728; <span id="sun-altitude">--</span>&deg;</span>
                                <span class="legend-panel">&#9654; <span id="pos-vertical">--</span>&deg;</span>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Right: Controls -->
                <div class="controls-col">
                    <div class="mode-toggle" style="margin-bottom:12px">
                        <button id="mode-manual-btn" class="btn btn-mode">Manual</button>
                        <button id="mode-auto-btn" class="btn btn-mode">Auto</button>
                    </div>
                    <div class="dpad dpad-sm">
                        <button class="dpad-btn up" data-direction="up">&#9650;</button>
                        <button class="dpad-btn left" data-direction="left">&#9664;</button>
                        <button class="dpad-btn center" id="stop-btn">STOP</button>
                        <button class="dpad-btn right" data-direction="right">&#9654;</button>
                        <button class="dpad-btn down" data-direction="down">&#9660;</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Alarms -->
        <section class="card collapsible" id="info-panel">
            <div class="card-header clickable" data-toggle="info-panel">
                <h2>Alarm History</h2>
                <span class="chevron">&#9660;</span>
            </div>
            <div class="card-body">
                <ul class="alarm-history" id="alarm-history">
                    <li class="no-history">No alarm history</li>
                </ul>
                <button id="clear-history-btn" class="btn btn-sm btn-ghost" style="margin-top:8px">Clear History</button>
            </div>
        </section>

        <!-- Connection (collapsible, collapsed by default when connected) -->
        <section class="card collapsible collapsed" id="connection-panel">
            <div class="card-header clickable" data-toggle="connection-panel">
                <h2>Connection</h2>
                <span class="chevron">&#9660;</span>
            </div>
            <div class="card-body">
                <div class="form-row">
                    <select id="port-select"><option value="">Select port...</option></select>
                    <button id="refresh-ports-btn" class="btn btn-sm btn-ghost">Refresh</button>
                </div>
                <div class="form-row">
                    <select id="baudrate-select">
                        <option value="9600" selected>9600</option>
                        <option value="19200">19200</option>
                        <option value="38400">38400</option>
                        <option value="57600">57600</option>
                        <option value="115200">115200</option>
                    </select>
                </div>
                <div class="form-row">
                    <button id="connect-btn" class="btn btn-success">Connect</button>
                    <button id="disconnect-btn" class="btn btn-danger" disabled>Disconnect</button>
                </div>
                <div class="form-row">
                    <button id="sync-clock-btn" class="btn btn-sm btn-ghost">&#8635; Sync Clock</button>
                </div>
                <div style="margin-top:8px;color:var(--text-dim);font-size:0.8rem">
                    Firmware: <span id="firmware-version">--</span>
                </div>
            </div>
        </section>

        <!-- Debug (collapsible, collapsed) -->
        <section class="card collapsible collapsed" id="debug-panel">
            <div class="card-header clickable" data-toggle="debug-panel">
                <h2>Debug</h2>
                <span class="chevron">&#9660;</span>
            </div>
            <div class="card-body">
                <div class="form-row" style="margin-bottom:12px">
                    <button id="home-btn" class="btn btn-sm btn-ghost">&#8962; HOME</button>
                    <button id="stow-btn" class="btn btn-sm btn-ghost">&#9660; STOW</button>
                </div>
                <div class="form-row">
                    <input type="text" id="raw-hex" placeholder="Hex data (e.g. 01020304)">
                    <button id="send-raw-btn" class="btn btn-sm btn-ghost">Send</button>
                </div>
                <pre id="debug-log"></pre>
            </div>
        </section>

        <footer>Solar Tracker API v0.1.0</footer>
    </div>

    <!-- Hidden elements for JS compat -->
    <input type="hidden" id="max-wind-input" value="0">
    <button id="set-wind-btn" style="display:none"></button>
    <span id="limit-h-min" style="display:none"></span>
    <span id="limit-h-max" style="display:none"></span>
    <span id="limit-v-min" style="display:none"></span>
    <span id="limit-v-max" style="display:none"></span>
    <span id="limits-since" style="display:none"></span>
    <button id="reset-limits-btn" style="display:none"></button>

    <script src="/static/app.js?v=38"></script>
</body>
</html>
