version: '3.8'

services:
  solartracker-api:
    image: ghcr.io/luis15pt/metalogalva-solartracker-api:latest
    container_name: solartracker-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SERIAL_PORT=/dev/ttyUSB0
      - SERIAL_BAUDRATE=9600
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC_PREFIX=solartracker
      - LOG_LEVEL=INFO
      - SBFSPOT_DB=/data/SBFspot.db
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    volumes:
      - ./data:/app/data
    group_add:
      - "20"  # dialout group GID for serial port access (check with: stat -c '%g' /dev/ttyUSB0)
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      - mosquitto
    networks:
      - solartracker-net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: solartracker-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - solartracker-net

networks:
  solartracker-net:
    driver: bridge
