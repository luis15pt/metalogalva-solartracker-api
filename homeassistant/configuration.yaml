# Home Assistant Configuration Example for Solar Tracker
#
# This file shows how to integrate the Solar Tracker API with Home Assistant.
# The integration uses MQTT auto-discovery, so most entities will be
# automatically created once the API is running.
#
# Prerequisites:
# 1. MQTT integration must be configured in Home Assistant
# 2. Point HA's MQTT broker to the same broker used by Solar Tracker API
#    (or configure them to use the same broker)

# =============================================================================
# MQTT Configuration
# =============================================================================

# If using the Solar Tracker's Mosquitto broker:
mqtt:
  broker: YOUR_RASPBERRY_PI_IP
  port: 1883
  # username: optional
  # password: optional

# =============================================================================
# Manual Entity Configuration (Optional)
# =============================================================================
# The Solar Tracker API publishes MQTT auto-discovery messages, so these
# manual configurations are optional. Use them if auto-discovery doesn't
# work or if you need custom settings.

# Binary Sensors
binary_sensor:
  - platform: mqtt
    name: "Solar Tracker Connected"
    state_topic: "solartracker/state/connected"
    payload_on: "ON"
    payload_off: "OFF"
    device_class: connectivity

  - platform: mqtt
    name: "Solar Tracker Alarm"
    state_topic: "solartracker/state/alarm_active"
    payload_on: "ON"
    payload_off: "OFF"
    device_class: problem

# Sensors
sensor:
  - platform: mqtt
    name: "Solar Tracker Mode"
    state_topic: "solartracker/state/mode"
    icon: mdi:auto-fix

  - platform: mqtt
    name: "Solar Tracker Horizontal Position"
    state_topic: "solartracker/state/position/horizontal"
    unit_of_measurement: "°"
    icon: mdi:compass

  - platform: mqtt
    name: "Solar Tracker Vertical Position"
    state_topic: "solartracker/state/position/vertical"
    unit_of_measurement: "°"
    icon: mdi:angle-acute

  - platform: mqtt
    name: "Solar Tracker Wind Speed"
    state_topic: "solartracker/state/wind_speed"
    unit_of_measurement: "km/h"
    device_class: wind_speed

# =============================================================================
# Input Helpers for Controls
# =============================================================================

input_select:
  solar_tracker_mode:
    name: Solar Tracker Mode
    options:
      - manual
      - automatic
    icon: mdi:cog

input_number:
  solar_tracker_max_wind:
    name: Solar Tracker Max Wind
    min: 0
    max: 99
    step: 1
    unit_of_measurement: "km/h"
    icon: mdi:weather-windy

# =============================================================================
# Scripts for Movement Control
# =============================================================================

script:
  solar_tracker_move_up:
    alias: "Solar Tracker Move Up"
    sequence:
      - service: mqtt.publish
        data:
          topic: "solartracker/command/move"
          payload: '{"direction": "up", "start": true}'
      - delay:
          milliseconds: 500
      - service: mqtt.publish
        data:
          topic: "solartracker/command/move"
          payload: '{"direction": "up", "start": false}'

  solar_tracker_move_down:
    alias: "Solar Tracker Move Down"
    sequence:
      - service: mqtt.publish
        data:
          topic: "solartracker/command/move"
          payload: '{"direction": "down", "start": true}'
      - delay:
          milliseconds: 500
      - service: mqtt.publish
        data:
          topic: "solartracker/command/move"
          payload: '{"direction": "down", "start": false}'

  solar_tracker_move_left:
    alias: "Solar Tracker Move Left"
    sequence:
      - service: mqtt.publish
        data:
          topic: "solartracker/command/move"
          payload: '{"direction": "left", "start": true}'
      - delay:
          milliseconds: 500
      - service: mqtt.publish
        data:
          topic: "solartracker/command/move"
          payload: '{"direction": "left", "start": false}'

  solar_tracker_move_right:
    alias: "Solar Tracker Move Right"
    sequence:
      - service: mqtt.publish
        data:
          topic: "solartracker/command/move"
          payload: '{"direction": "right", "start": true}'
      - delay:
          milliseconds: 500
      - service: mqtt.publish
        data:
          topic: "solartracker/command/move"
          payload: '{"direction": "right", "start": false}'

  solar_tracker_clear_alarms:
    alias: "Solar Tracker Clear Alarms"
    sequence:
      - service: mqtt.publish
        data:
          topic: "solartracker/command/clear_alarms"
          payload: "clear"

# =============================================================================
# Automations
# =============================================================================

automation:
  # Sync mode input_select with actual tracker mode
  - alias: "Solar Tracker Mode Sync"
    trigger:
      - platform: mqtt
        topic: "solartracker/state/mode"
    action:
      - service: input_select.select_option
        target:
          entity_id: input_select.solar_tracker_mode
        data:
          option: "{{ trigger.payload }}"

  # Send mode change when input_select changes
  - alias: "Solar Tracker Mode Change"
    trigger:
      - platform: state
        entity_id: input_select.solar_tracker_mode
    action:
      - service: mqtt.publish
        data:
          topic: "solartracker/command/mode"
          payload: "{{ states('input_select.solar_tracker_mode') }}"

  # Sync max wind input_number
  - alias: "Solar Tracker Max Wind Sync"
    trigger:
      - platform: mqtt
        topic: "solartracker/state/max_wind"
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.solar_tracker_max_wind
        data:
          value: "{{ trigger.payload | int }}"

  # Send max wind when input_number changes
  - alias: "Solar Tracker Max Wind Change"
    trigger:
      - platform: state
        entity_id: input_number.solar_tracker_max_wind
    action:
      - service: mqtt.publish
        data:
          topic: "solartracker/command/set_wind"
          payload: "{{ states('input_number.solar_tracker_max_wind') | int }}"

  # Alert on alarms
  - alias: "Solar Tracker Alarm Alert"
    trigger:
      - platform: state
        entity_id: binary_sensor.solar_tracker_alarm
        to: "on"
    action:
      - service: notify.notify
        data:
          title: "Solar Tracker Alarm"
          message: "An alarm has been triggered on the solar tracker!"
