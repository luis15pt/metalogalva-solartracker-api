# Home Assistant Lovelace Dashboard Card for Solar Tracker
#
# Copy this YAML into your Lovelace dashboard configuration
# or use the UI editor to create a similar layout.

type: vertical-stack
cards:
  # Header Card
  - type: markdown
    content: |
      # ☀️ Solar Tracker Control

  # Status Card
  - type: horizontal-stack
    cards:
      - type: entity
        entity: binary_sensor.solar_tracker_connected
        name: Connection
        icon: mdi:lan-connect

      - type: entity
        entity: sensor.solar_tracker_mode
        name: Mode
        icon: mdi:cog

      - type: entity
        entity: binary_sensor.solar_tracker_alarm
        name: Alarm
        icon: mdi:bell-alert

  # Position Card
  - type: glance
    title: Position
    entities:
      - entity: sensor.solar_tracker_horizontal_position
        name: Azimuth
      - entity: sensor.solar_tracker_vertical_position
        name: Tilt
      - entity: sensor.solar_tracker_wind_speed
        name: Wind

  # Movement Control Card
  - type: grid
    title: Movement Control
    columns: 3
    square: true
    cards:
      - type: custom:button-card
        color_type: blank-card

      - type: button
        name: Up
        icon: mdi:arrow-up-bold
        tap_action:
          action: call-service
          service: script.solar_tracker_move_up

      - type: custom:button-card
        color_type: blank-card

      - type: button
        name: Left
        icon: mdi:arrow-left-bold
        tap_action:
          action: call-service
          service: script.solar_tracker_move_left

      - type: button
        name: Stop
        icon: mdi:stop
        tap_action:
          action: call-service
          service: mqtt.publish
          service_data:
            topic: solartracker/command/move
            payload: '{"direction": "up", "start": false}'
        styles:
          card:
            - background-color: red

      - type: button
        name: Right
        icon: mdi:arrow-right-bold
        tap_action:
          action: call-service
          service: script.solar_tracker_move_right

      - type: custom:button-card
        color_type: blank-card

      - type: button
        name: Down
        icon: mdi:arrow-down-bold
        tap_action:
          action: call-service
          service: script.solar_tracker_move_down

      - type: custom:button-card
        color_type: blank-card

  # Mode Selection
  - type: entities
    title: Settings
    entities:
      - entity: input_select.solar_tracker_mode
        name: Operating Mode

      - entity: input_number.solar_tracker_max_wind
        name: Max Wind Threshold

  # Actions
  - type: horizontal-stack
    cards:
      - type: button
        name: Clear Alarms
        icon: mdi:bell-off
        tap_action:
          action: call-service
          service: script.solar_tracker_clear_alarms

      - type: button
        name: Web UI
        icon: mdi:web
        tap_action:
          action: url
          url_path: http://YOUR_RASPBERRY_PI_IP:8000

---
# Alternative Simple Card (no custom cards required)
# Use this if you don't have custom:button-card installed

type: vertical-stack
cards:
  - type: entities
    title: Solar Tracker
    entities:
      - binary_sensor.solar_tracker_connected
      - sensor.solar_tracker_mode
      - binary_sensor.solar_tracker_alarm
      - sensor.solar_tracker_horizontal_position
      - sensor.solar_tracker_vertical_position
      - sensor.solar_tracker_wind_speed

  - type: entities
    title: Controls
    entities:
      - input_select.solar_tracker_mode
      - input_number.solar_tracker_max_wind

  - type: button
    name: Open Web Control Panel
    icon: mdi:web
    tap_action:
      action: url
      url_path: http://YOUR_RASPBERRY_PI_IP:8000
